<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון ארביטראז' - פירוט החזרי ריבית ורווחים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        th { background-color: #1e293b; color: white; padding: 12px; position: sticky; top: 0; font-size: 0.75rem; border-left: 1px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center; font-size: 0.85rem; }
        .val-gross { color: #3b82f6; font-weight: bold; }
        .val-before { color: #64748b; font-weight: bold; }
        .val-net { color: #10b981; font-weight: 800; }
        .val-pay { color: #ef4444; font-weight: 600; }
        .highlight { background-color: #f8fafc; border-right: 4px solid #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-black text-slate-800 text-center mb-6">ניתוח מינוף: החזרי ריבית מול תשואת שוק</h1>
        
        <div class="card p-6 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end shadow-md border-t-4 border-blue-600">
            <div>
                <label class="block text-xs font-bold mb-1">סכום הלוואה (₪)</label>
                <input type="number" id="loan" value="200000" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">ריבית שנתית (%)</label>
                <input type="number" id="loanInt" value="5" step="0.1" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">תשואה S&P (%)</label>
                <input type="number" id="marketYield" value="9" step="0.1" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <button onclick="exportExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded shadow transition flex items-center justify-center gap-2">
                <span>📥</span> הורד דוח אקסל
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 text-center">
                <div class="text-red-500 text-[10px] font-bold uppercase">סה"כ ריבית שתשולם</div>
                <div id="sumTotalInt" class="text-xl font-black text-slate-700">0 ₪</div>
            </div>
            <div class="card p-4 text-center border-b-4 border-blue-400">
                <div class="text-blue-500 text-[10px] font-bold uppercase">רווח בורסה (ברוטו)</div>
                <div id="sumGross" class="text-xl font-black text-slate-700">0 ₪</div>
            </div>
            <div class="card p-4 text-center border-b-4 border-slate-400">
                <div class="text-slate-500 text-[10px] font-bold uppercase">רווח (לפני מס)</div>
                <div id="sumBeforeTax" class="text-xl font-black text-slate-700">0 ₪</div>
            </div>
            <div class="card p-4 text-center border-b-4 border-emerald-500 bg-emerald-50 shadow-inner">
                <div class="text-emerald-600 text-[10px] font-bold uppercase italic">נטו סופי בכיס</div>
                <div id="sumNet" class="text-2xl font-black text-emerald-700">0 ₪</div>
            </div>
        </div>

        <div class="card overflow-hidden h-[500px] overflow-y-auto">
            <table id="mainTable" class="w-full">
                <thead>
                    <tr>
                        <th>חודש</th>
                        <th class="bg-slate-700">החזר ריבית (מהעו"ש)</th>
                        <th>ריבית מצטברת</th>
                        <th>שווי קופה</th>
                        <th class="bg-blue-50 text-blue-900">רווח גולמי (בורסה)</th>
                        <th class="bg-emerald-100 text-emerald-900 font-bold">רווח נטו (אחרי מס)</th>
                    </tr>
                </thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
        
        <p class="text-[11px] text-slate-400 mt-4 text-center">* החישוב מניח מס רווח הון של 25% המשולם במשיכה בתום 5 שנים.</p>
    </div>

    <script>
        function calculate() {
            const loan = parseFloat(document.getElementById('loan').value) || 0;
            const lInt = (parseFloat(document.getElementById('loanInt').value) || 0) / 100 / 12;
            const mYield = (parseFloat(document.getElementById('marketYield').value) || 0) / 100 / 12;
            
            let currentVal = loan;
            let totalIntPaid = 0;
            let html = "";
            const monthlyPayment = loan * lInt;

            for (let i = 0; i <= 60; i++) {
                if (i > 0) {
                    currentVal *= (1 + mYield);
                    totalIntPaid += monthlyPayment;
                }
                
                const grossProfit = currentVal - loan; 
                const tax = grossProfit > 0 ? grossProfit * 0.25 : 0;
                const netBeforeTax = grossProfit - totalIntPaid;
                const netAfterTax = (grossProfit - tax) - totalIntPaid;

                html += `<tr class="${i === 60 ? 'highlight font-bold' : ''}">
                    <td>${i}</td>
                    <td class="val-pay">${i === 0 ? '-' : Math.round(monthlyPayment).toLocaleString() + ' ₪'}</td>
                    <td class="text-slate-400">${Math.round(totalIntPaid).toLocaleString()} ₪</td>
                    <td>${Math.round(currentVal).toLocaleString()} ₪</td>
                    <td class="val-gross">${Math.round(grossProfit).toLocaleString()} ₪</td>
                    <td class="val-net">${Math.round(netAfterTax).toLocaleString()} ₪</td>
                </tr>`;

                if (i === 60) {
                    document.getElementById('sumTotalInt').innerText = Math.round(totalIntPaid).toLocaleString() + " ₪";
                    document.getElementById('sumGross').innerText = Math.round(grossProfit).toLocaleString() + " ₪";
                    document.getElementById('sumBeforeTax').innerText = Math.round(netBeforeTax).toLocaleString() + " ₪";
                    document.getElementById('sumNet').innerText = Math.round(netAfterTax).toLocaleString() + " ₪";
                }
            }
            document.getElementById('tBody').innerHTML = html;
        }

        function exportExcel() {
            const table = document.getElementById("mainTable");
            const wb = XLSX.utils.table_to_book(table, {sheet: "InvestmentReport"});
            XLSX.writeFile(wb, "SP500_Loan_Arbitrage.xlsx");
        }

        window.onload = calculate;
    </script>
</body>
</html>
