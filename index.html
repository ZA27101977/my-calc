<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון השקעה S&P 500 מול הלוואה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; }
        th { background-color: #1e293b; color: white; position: sticky; top: 0; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        tr:nth-child(even) { background-color: #f1f5f9; }
        .positive { color: #10b981; font-weight: bold; }
        .negative { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-extrabold text-slate-800 text-center mb-8">מחשבון טבלת השקעה ממונפת (S&P 500)</h1>
        
        <div class="bg-white p-6 rounded-xl shadow-md mb-8 grid grid-cols-1 md:grid-cols-4 gap-6">
            <div>
                <label class="block text-sm font-bold mb-2">סכום הלוואה (₪)</label>
                <input type="number" id="loan" value="200000" class="w-full p-2 border rounded shadow-sm" oninput="updateTable()">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">ריבית הלוואה שנתית (%)</label>
                <input type="number" id="int" value="5" step="0.1" class="w-full p-2 border rounded shadow-sm" oninput="updateTable()">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">תשואה צפויה S&P (%)</label>
                <input type="number" id="yield" value="9" step="0.5" class="w-full p-2 border rounded shadow-sm" oninput="updateTable()">
            </div>
            <div class="bg-blue-600 text-white p-4 rounded-lg text-center">
                <div class="text-xs opacity-80">החזר ריבית חודשי (מהעו"ש)</div>
                <div id="monthlyPay" class="text-xl font-bold">833 ₪</div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="max-h-[600px] overflow-y-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            <th>חודש</th>
                            <th>חוב (קרן)</th>
                            <th>תשלום ריבית</th>
                            <th>שווי ב-S&P 500</th>
                            <th>רווח/הפסד נטו (₪)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="finalSummary" class="mt-6 p-6 bg-slate-800 text-white rounded-xl text-center text-xl font-bold">
            </div>
    </div>

    <script>
        function updateTable() {
            const loan = parseFloat(document.getElementById('loan').value) || 0;
            const annualInt = parseFloat(document.getElementById('int').value) || 0;
            const annualYield = parseFloat(document.getElementById('yield').value) || 0;
            
            const monthlyIntRate = (annualInt / 100) / 12;
            const monthlyYieldRate = (annualYield / 100) / 12;
            const monthlyPayment = loan * monthlyIntRate;
            
            document.getElementById('monthlyPay').innerText = Math.round(monthlyPayment).toLocaleString() + " ₪";
            
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            let currentValue = loan;
            let totalInterestPaid = 0;
            
            for (let i = 0; i <= 60; i++) { // חישוב ל-5 שנים
                if (i > 0) {
                    currentValue *= (1 + monthlyYieldRate);
                    totalInterestPaid += monthlyPayment;
                }
                
                const netProfit = currentValue - loan - totalInterestPaid;
                const statusClass = netProfit >= 0 ? 'positive' : 'negative';
                
                const row = `
                    <tr>
                        <td>${i}</td>
                        <td>${loan.toLocaleString()} ₪</td>
                        <td>${i === 0 ? '-' : Math.round(monthlyPayment).toLocaleString() + ' ₪'}</td>
                        <td>${Math.round(currentValue).toLocaleString()} ₪</td>
                        <td class="${statusClass}">${Math.round(netProfit).toLocaleString()} ₪</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
                
                if (i === 60) {
                    const tax = netProfit > 0 ? netProfit * 0.25 : 0;
                    const finalNet = netProfit - tax;
                    document.getElementById('finalSummary').innerHTML = `
                        רווח נטו משוער אחרי 5 שנים: ${Math.round(netProfit).toLocaleString()} ₪ <br>
                        <span class="text-sm font-normal opacity-80">לאחר מס רווח הון (25%): ${Math.round(finalNet).toLocaleString()} ₪</span>
                    `;
                }
            }
        }
        window.onload = updateTable;
    </script>
</body>
</html>
