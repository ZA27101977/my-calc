<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון ארביטראז' - פירוט רווח כולל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        th { background-color: #1e293b; color: white; padding: 12px; position: sticky; top: 0; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center; font-size: 0.9rem; }
        .val-gross { color: #3b82f6; font-weight: bold; } /* כחול - גולמי */
        .val-before { color: #64748b; font-weight: bold; } /* אפור - לפני מס */
        .val-net { color: #10b981; font-weight: 800; } /* ירוק - נטו */
        .highlight { background-color: #f8fafc; border-right: 4px solid #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-black text-slate-800 text-center mb-6">ניתוח רווחים: גולמי vs נטו</h1>
        
        <div class="card p-6 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end shadow-md">
            <div>
                <label class="block text-xs font-bold mb-1">סכום הלוואה (₪)</label>
                <input type="number" id="loan" value="200000" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">ריבית הלוואה (%)</label>
                <input type="number" id="loanInt" value="5" step="0.1" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">תשואה S&P (%)</label>
                <input type="number" id="marketYield" value="9" step="0.1" class="w-full p-2 border rounded" oninput="calculate()">
            </div>
            <button onclick="exportExcel()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow transition">
                📥 הורד אקסל מפורט
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-5 text-center border-b-4 border-blue-500">
                <div class="text-blue-500 text-xs font-bold uppercase">1. רווח בורסה גולמי</div>
                <div id="sumGross" class="text-2xl font-black text-slate-700">0 ₪</div>
                <div class="text-[10px] text-slate-400">שווי קופה פחות קרן (לפני ריבית ומס)</div>
            </div>
            <div class="card p-5 text-center border-b-4 border-slate-400">
                <div class="text-slate-500 text-xs font-bold uppercase">2. רווח לפני מס</div>
                <div id="sumBeforeTax" class="text-2xl font-black text-slate-700">0 ₪</div>
                <div class="text-[10px] text-slate-400">רווח גולמי פחות עלות הלוואה</div>
            </div>
            <div class="card p-5 text-center border-b-4 border-emerald-500 bg-emerald-50">
                <div class="text-emerald-600 text-xs font-bold uppercase">3. רווח נטו (סופי)</div>
                <div id="sumNet" class="text-3xl font-black text-emerald-700">0 ₪</div>
                <div class="text-[10px] text-emerald-500 font-bold">אחרי מס 25% וריבית הלוואה</div>
            </div>
        </div>

        <div class="card overflow-hidden h-[500px] overflow-y-auto shadow-inner">
            <table id="mainTable" class="w-full">
                <thead>
                    <tr>
                        <th>חודש</th>
                        <th>שווי קופה</th>
                        <th>ריבית מצטברת</th>
                        <th class="bg-blue-50 text-blue-900">רווח גולמי</th>
                        <th class="bg-slate-100 text-slate-900">לפני מס</th>
                        <th class="bg-emerald-100 text-emerald-900 font-bold">נטו בכיס</th>
                    </tr>
                </thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function calculate() {
            const loan = parseFloat(document.getElementById('loan').value) || 0;
            const lInt = (parseFloat(document.getElementById('loanInt').value) || 0) / 100 / 12;
            const mYield = (parseFloat(document.getElementById('marketYield').value) || 0) / 100 / 12;
            
            let currentVal = loan;
            let totalIntPaid = 0;
            let html = "";

            for (let i = 0; i <= 60; i++) {
                if (i > 0) {
                    currentVal *= (1 + mYield);
                    totalIntPaid += (loan * lInt);
                }
                
                const grossProfit = currentVal - loan; 
                const tax = grossProfit > 0 ? grossProfit * 0.25 : 0;
                const netBeforeTax = grossProfit - totalIntPaid;
                const netAfterTax = (grossProfit - tax) - totalIntPaid;

                html += `<tr class="${i === 60 ? 'highlight font-bold' : ''}">
                    <td>${i}</td>
                    <td>${Math.round(currentVal).toLocaleString()} ₪</td>
                    <td class="text-red-400">-${Math.round(totalIntPaid).toLocaleString()}</td>
                    <td class="val-gross">${Math.round(grossProfit).toLocaleString()} ₪</td>
                    <td class="val-before">${Math.round(netBeforeTax).toLocaleString()} ₪</td>
                    <td class="val-net">${Math.round(netAfterTax).toLocaleString()} ₪</td>
                </tr>`;

                if (i === 60) {
                    document.getElementById('sumGross').innerText = Math.round(grossProfit).toLocaleString() + " ₪";
                    document.getElementById('sumBeforeTax').innerText = Math.round(netBeforeTax).toLocaleString() + " ₪";
                    document.getElementById('sumNet').innerText = Math.round(netAfterTax).toLocaleString() + " ₪";
                }
            }
            document.getElementById('tBody').innerHTML = html;
        }

        function exportExcel() {
            const table = document.getElementById("mainTable");
            const wb = XLSX.utils.table_to_book(table, {sheet: "Report"});
            XLSX.writeFile(wb, "Full_Investment_Audit.xlsx");
        }

        window.onload = calculate;
    </script>
</body>
</html>
